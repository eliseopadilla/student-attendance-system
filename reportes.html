<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reportes de Asistencia</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="stylesheet" href="Style2.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Docente</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMain">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link active" href="#">Reportes</a></li>
                <li class="nav-item"><a class="nav-link" href="maestroIndex.html">Asistencias</a></li>
            </ul>

            <ul class="navbar-nav">
                <li class="nav-item text-end">
                    <span class="nav-link text-info" id="nombreDocente" style="font-weight:bold;"></span>
                </li>
                <li class="nav-item"><a class="nav-link text-danger" href="loginIndex.html">Cerrar Sesión</a></li>
            </ul>
        </div>

    </div>
</nav>

<h2 class="text-center mb-4 mt-2">📊 Reporte de Asistencias</h2>

<div class="card shadow p-3 mb-4">
    <div class="row g-3">

        <div class="col-md-4">
            <label class="fw-bold">📅 Fecha inicio:</label>
            <input type="date" id="fechaInicio" class="form-control">
        </div>

        <div class="col-md-4">
            <label class="fw-bold">📅 Fecha fin:</label>
            <input type="date" id="fechaFin" class="form-control">
        </div>

        <div class="col-md-4">
            <label class="fw-bold">👤 Alumno:</label>
            <select id="selectAlumno" class="form-select">
                <option value="">Todos</option>
            </select>
        </div>

        <div class="col-md-4 mt-4">
            <button id="btnGenerar" class="btn btn-primary w-100">Generar reporte</button>
        </div>

        <div class="col-md-4 mt-4">
            <button id="btnPDF" class="btn btn-success w-100" style="display:none">📄 Descargar PDF General</button>
        </div>

        <div class="col-md-4 mt-4">
            <button id="btnPDFAlumno" class="btn btn-secondary w-100" style="display:none">📄 PDF por Alumno</button>
        </div>

    </div>
</div>

<div class="card shadow mb-4 p-3 text-center">
    <h4 class="mb-3">📈 Gráfica General</h4>
    <canvas id="graficaReporte"></canvas>
</div>

<div class="card shadow p-3 text-center" id="cardAlumno" style="display:none;">
    <h4 class="mb-3">👤 Gráfica por Alumno</h4>
    <canvas id="graficaAlumno"></canvas>
</div>

<script src="reportes.js"></script>

</body>
</html>
