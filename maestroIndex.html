<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Docente - Control de Asistencias</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="Style2.css">

    <style>
        body { padding-bottom: 40px; }
        #tablaAlumnos th, #tablaAlumnos td { text-align: center; }
        .filtros label { font-weight: 600; margin-right: 8px; }
        .guardar-btn {
            margin-top: 15px;
            width: 100%;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Docente</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMain">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link active" href="#">Asistencias</a></li>
                <li class="nav-item"><a class="nav-link" href="reportes.html">Reportes</a></li>
            </ul>

            <ul class="navbar-nav">
                <li class="nav-item text-end">
                    <span class="nav-link text-info" id="nombreDocente" style="font-weight:bold;"></span>
                </li>
                <li class="nav-item"><a class="nav-link text-danger" href="loginIndex.html">Cerrar Sesión</a></li>
            </ul>
        </div>

    </div>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Registro de Asistencias</h3>
        <small id="rolUsuario" class="text-muted"></small>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-body d-flex flex-wrap gap-3">

            <div>
                <label class="form-label">Clase / Materia:</label>
                <select id="selectClase" class="form-select">
                    <option value="">Seleccionar...</option>
                </select>
            </div>

            <div>
                <label class="form-label">Grupo:</label>
                <select id="selectGrupo" class="form-select">
                    <option value="">Seleccionar...</option>
                </select>
            </div>

            <div>
                <label class="form-label">Fecha:</label>
                <input type="date" id="selectFecha" class="form-control">
            </div>

        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <table id="tablaAlumnos" class="table table-bordered table-hover table-sm">
                <thead class="table-primary text-primary">
                    <tr>
                        <th>Alumno</th>
                        <th>Asistió</th>
                        <th>Retardo</th>
                        <th>Falta</th>
                        <th>Justificado</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

            <button id="guardarAsistencia" class="btn btn-success guardar-btn">
                <i class="fa fa-save me-2"></i>Guardar asistencia
            </button>

            <button id="editarAsistencia" class="btn btn-warning guardar-btn mt-2" style="display:none;">
                <i class="fa fa-pencil me-2"></i>Editar asistencia
            </button>

        </div>
    </div>

    <div class="card shadow-sm mt-4">
        <div class="card-body">
            <h5 class="mb-3">Estadísticas de Asistencia</h5>
            <canvas id="graficaAsistencia" height="120"></canvas>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="scriptmaestro.js"></script>

</body>
</html>
